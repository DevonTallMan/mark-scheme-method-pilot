name: Accessibility Fixes

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy'
        required: true

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Patch index.html
        run: |
          echo "" | base64 -d > /tmp/p1.py
          python3 /tmp/p1.py

      - name: Patch hub.html
        run: |
          echo "" | base64 -d > /tmp/p2.py
          python3 /tmp/p2.py

      - name: Patch dashboard.html
        run: |
          echo "" | base64 -d > /tmp/p3.py
          python3 /tmp/p3.py

      - name: Verify patches
        run: |
          FAIL=0
          grep -q 'a11y-patched' index.html && echo "OK index" || { echo "FAIL index"; FAIL=1; }
          grep -q 'a11y-patched' hub.html && echo "OK hub" || { echo "FAIL hub"; FAIL=1; }
          grep -q 'a11y-patched' dashboard.html && echo "OK dashboard" || { echo "FAIL dashboard"; FAIL=1; }
          grep -q 'focus-visible' index.html && echo "OK focus CSS" || { echo "FAIL focus CSS"; FAIL=1; }
          grep -q 'skip-link' index.html && echo "OK skip link" || { echo "FAIL skip link"; FAIL=1; }
          [ $FAIL -eq 0 ] || exit 1

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add index.html hub.html dashboard.html
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "feat: accessibility - focus ring, skip links, landmarks, input labels"
          git push origin main
