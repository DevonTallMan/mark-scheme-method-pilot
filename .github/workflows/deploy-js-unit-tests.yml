name: Deploy JS Unit Tests
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to deploy JS unit test suite"
        required: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main && git merge origin/main --ff-only

      - name: Write teacher-logic.js
        run: |
          python3 - << 'PYEOF'
          import base64, os
          content = base64.b64decode("
          with open("teacher-logic.js", "w") as f:
              f.write(content)

