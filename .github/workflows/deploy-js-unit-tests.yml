name: Deploy JS Unit Tests

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to deploy JS unit test suite"
        required: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main && git merge origin/main --ff-only

      - name: Write teacher-logic.js
        run: |
          python3 - << 'PYEOF'
import base64, os
content = base64.b64decode("").decode()
with open("teacher-logic.js", "w") as f:
    f.write(content)
print("Written teacher-logic.js", len(content), "bytes")
PYEOF

      - name: Write tests/unit/teacher-logic.test.js
        run: |
          python3 - << 'PYEOF'
import base64, os
content = base64.b64decode("").decode()
os.makedirs("tests/unit", exist_ok=True)
with open("tests/unit/teacher-logic.test.js", "w") as f:
    f.write(content)
print("Written tests/unit/teacher-logic.test.js", len(content), "bytes")
PYEOF

      - name: Write package.json
        run: |
          python3 - << 'PYEOF'
import base64, os
content = base64.b64decode("").decode()
# Only write if no package.json exists, to avoid overwriting any existing config
if not os.path.exists("package.json"):
    with open("package.json", "w") as f:
        f.write(content)
    print("Written package.json")
else:
    # Merge jest config into existing package.json
    import json
    with open("package.json") as f:
        pkg = json.load(f)
    pkg.setdefault("scripts", {})
    pkg["scripts"]["test"] = "jest --testPathPattern=tests/unit/teacher-logic.test.js"
    pkg["scripts"]["test:coverage"] = "jest --coverage --testPathPattern=tests/unit/teacher-logic.test.js"
    pkg.setdefault("devDependencies", {})["jest"] = "^29.0.0"
    pkg.setdefault("jest", {})["testEnvironment"] = "node"
    with open("package.json", "w") as f:
        json.dump(pkg, f, indent=2)
    print("Merged jest config into existing package.json")
PYEOF

      - name: Patch teacher.html — inject teacher-logic.js script tag
        run: |
          python3 - << 'PYEOF'
import base64
exec(base64.b64decode("").decode())
PYEOF

      - name: Verify all files
        run: |
          echo "=== teacher-logic.js (head) ===" && head -5 teacher-logic.js
          echo "=== test file (head) ===" && head -5 tests/unit/teacher-logic.test.js
          echo "=== package.json ===" && cat package.json
          echo "=== teacher.html script tag check ==="
          grep -n "teacher-logic.js" teacher.html || (echo "FAIL: teacher-logic.js script tag missing from teacher.html" && exit 1)
          # Hard-fail if key content is absent
          grep -q "rankFromBadges" teacher-logic.js || (echo "FAIL: rankFromBadges missing from teacher-logic.js" && exit 1)
          grep -q "calculateStats" teacher-logic.js || (echo "FAIL: calculateStats missing from teacher-logic.js" && exit 1)
          grep -q "module.exports" teacher-logic.js || (echo "FAIL: module.exports missing from teacher-logic.js" && exit 1)
          grep -q "rankFromBadges" tests/unit/teacher-logic.test.js || (echo "FAIL: test file missing rankFromBadges tests" && exit 1)
          echo "All checks passed"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Jest
        run: npm install

      - name: Run JS unit tests
        run: npm test

      - name: Commit and push
        run: |
          git add teacher-logic.js tests/unit/teacher-logic.test.js package.json package-lock.json teacher.html
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Add JS unit test suite + wire teacher.html: teacher-logic.js, 37 Jest tests, script tag injection"
          git push origin main
