name: PageSpeed Fixes

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy'
        required: true

jobs:
  psi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Fix render-blocking fonts - preconnect and display=swap
        run: |
          echo "" | base64 -d > /tmp/fix_perf.py
          python3 /tmp/fix_perf.py

      - name: Add main landmark to hub, topics, dashboard, index
        run: |
          echo "" | base64 -d > /tmp/fix_main.py
          python3 /tmp/fix_main.py

      - name: Verify
        run: |
          FAIL=0
          grep -q 'perf-patched' index.html && echo "OK font fix index" || { echo "FAIL font fix index"; FAIL=1; }
          grep -q 'perf-patched' hub.html && echo "OK font fix hub" || { echo "FAIL font fix hub"; FAIL=1; }
          grep -q 'landmark-patched' index.html && echo "OK main landmark index" || { echo "FAIL main landmark index"; FAIL=1; }
          grep -q 'landmark-patched' hub.html && echo "OK main landmark hub" || { echo "FAIL main landmark hub"; FAIL=1; }
          grep -q 'landmark-patched' dashboard.html && echo "OK main landmark dashboard" || { echo "FAIL main landmark dashboard"; FAIL=1; }
          grep -q 'display=swap' index.html && echo "OK display=swap" || { echo "FAIL display=swap missing"; FAIL=1; }
          grep -q 'preconnect' index.html && echo "OK preconnect hints" || { echo "FAIL preconnect missing"; FAIL=1; }
          [ $FAIL -eq 0 ] || exit 1

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "perf/a11y: font preconnect + display=swap, main landmark on core pages"
          git push origin main
