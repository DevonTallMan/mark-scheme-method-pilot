name: MSM — Model Answer Reveal + Proxy Fix (learn/6-1-3)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to run'
        required: true

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Patch learn/6-1-3/index.html
        run: python3 -c "import base64; exec(base64.b64decode('�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh��IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�IDilIDilIDh�').decode())"

      - name: Verify patch
        run: |
          echo "--- Checking anchors ---"
          grep -c 'MODEL_ANSWERS' learn/6-1-3/index.html && echo "MODEL_ANSWERS: OK" || { echo "MODEL_ANSWERS: MISSING"; exit 1; }
          grep -c 'btn-show-model' learn/6-1-3/index.html && echo "btn-show-model: OK" || { echo "btn-show-model: MISSING"; exit 1; }
          grep -c 'pa-model-answer' learn/6-1-3/index.html && echo "pa-model-answer panel: OK" || { echo "pa-model-answer panel: MISSING"; exit 1; }
          grep -c 'paShowModelAnswer' learn/6-1-3/index.html && echo "paShowModelAnswer fn: OK" || { echo "paShowModelAnswer fn: MISSING"; exit 1; }
          grep -c 'btnModel' learn/6-1-3/index.html && echo "button reveal: OK" || { echo "button reveal: MISSING"; exit 1; }
          grep -c 'msm-axiom-proxy' learn/6-1-3/index.html && echo "proxy URL: OK" || { echo "proxy URL: MISSING"; exit 1; }
          echo "--- All checks passed ---"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add learn/6-1-3/index.html
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "feat: model answer reveal + proxy fix (learn/6-1-3)"
          git push origin main
