name: MSM - Model Answer Reveal v4 (learn/6-1-3)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to run'
        required: true

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Patch proxy URL
        run: python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Patch CSS
        run: python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Patch MODEL_ANSWERS part A
        run: printf '%s' '' > /tmp/s6a.b64

      - name: Patch MODEL_ANSWERS part B
        run: |
          printf '%s' '' >> /tmp/s6a.b64
          python3 -c "import base64; exec(base64.b64decode(open('/tmp/s6a.b64').read()).decode())"

      - name: Patch paShowModelAnswer fn
        run: python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Patch question index tracking
        run: python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Patch HTML button and panel
        run: python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Patch button reveal
        run: python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Verify
        run: |
          echo "--- Checking anchors ---"
          grep -c 'MODEL_ANSWERS' learn/6-1-3/index.html && echo "MODEL_ANSWERS: OK" || { echo "MISSING"; exit 1; }
          grep -c 'btn-show-model' learn/6-1-3/index.html && echo "btn-show-model: OK" || { echo "MISSING"; exit 1; }
          grep -c 'paShowModelAnswer' learn/6-1-3/index.html && echo "paShowModelAnswer: OK" || { echo "MISSING"; exit 1; }
          grep -c 'btnModel' learn/6-1-3/index.html && echo "btnModel: OK" || { echo "MISSING"; exit 1; }
          grep -c 'msm-axiom-proxy' learn/6-1-3/index.html && echo "proxy: OK" || { echo "MISSING"; exit 1; }
          echo "--- All checks passed ---"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add learn/6-1-3/index.html
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "feat: model answer reveal + proxy fix (learn/6-1-3)"
          git push origin main
