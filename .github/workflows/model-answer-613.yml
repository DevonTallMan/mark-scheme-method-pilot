name: MSM - Model Answer Reveal v5 (learn/6-1-3)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to run'
        required: true

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Patch CSS
        run: python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Patch MODEL_ANSWERS and showModelAnswer
        run: python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Patch HTML button and panel
        run: python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Patch button reveal
        run: python3 -c "import base64; exec(base64.b64decode('').decode())"

      - name: Verify
        run: |
          echo "--- Checking anchors ---"
          grep -c 'MODEL_ANSWERS' learn/6-1-3/index.html && echo "MODEL_ANSWERS: OK" || { echo "MISSING"; exit 1; }
          grep -c 'btn-show-ma' learn/6-1-3/index.html && echo "btn-show-ma: OK" || { echo "MISSING"; exit 1; }
          grep -c 'showModelAnswer' learn/6-1-3/index.html && echo "showModelAnswer: OK" || { echo "MISSING"; exit 1; }
          grep -c 'maBtn' learn/6-1-3/index.html && echo "maBtn reveal: OK" || { echo "MISSING"; exit 1; }
          grep -c 'ma-panel' learn/6-1-3/index.html && echo "ma-panel: OK" || { echo "MISSING"; exit 1; }
          echo "--- All checks passed ---"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add learn/6-1-3/index.html
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "feat: model answer reveal (learn/6-1-3)"
          git push origin main
