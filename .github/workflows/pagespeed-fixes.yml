name: PageSpeed Fixes

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy'
        required: true

jobs:
  fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Fix render-blocking fonts
        run: |
          echo "" | base64 -d > /tmp/fix_fonts.py
          python3 /tmp/fix_fonts.py

      - name: Add main landmark to key pages
        run: |
          echo "" | base64 -d > /tmp/fix_main.py
          python3 /tmp/fix_main.py

      - name: Verify
        run: |
          FAIL=0
          grep -q 'fonts-optimised' index.html && echo "OK fonts index" || { echo "FAIL fonts index"; FAIL=1; }
          grep -q 'fonts-optimised' hub.html   && echo "OK fonts hub"   || { echo "FAIL fonts hub";   FAIL=1; }
          grep -q 'main-landmark' index.html    && echo "OK main index"  || { echo "FAIL main index";  FAIL=1; }
          grep -q 'main-landmark' hub.html      && echo "OK main hub"    || { echo "FAIL main hub";    FAIL=1; }
          grep -q 'main-landmark' dashboard.html && echo "OK main dash"  || { echo "FAIL main dash";   FAIL=1; }
          [ $FAIL -eq 0 ] || exit 1

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "perf+a11y: font preconnect/display=swap, main landmark on all pages"
          git push origin main
