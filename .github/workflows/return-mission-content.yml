name: Return Mission Content Build

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy'
        required: true

jobs:
  rm_content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Patch review-612 CA 6.1.2
        run: echo "" | base64 -d > /tmp/p.py && python3 /tmp/p.py

      - name: Patch review-613 CA 6.1.3
        run: echo "" | base64 -d > /tmp/p.py && python3 /tmp/p.py

      - name: Patch review-62 CA 6.2
        run: echo "" | base64 -d > /tmp/p.py && python3 /tmp/p.py

      - name: Patch review-63 CA 6.3
        run: echo "" | base64 -d > /tmp/p.py && python3 /tmp/p.py

      - name: Verify
        run: |
          FAIL=0
          grep -q 'rmv2-612-final' review-612.html && echo "OK 612" || { echo "FAIL 612"; FAIL=1; }
          grep -q 'rmv2-613-final' review-613.html && echo "OK 613" || { echo "FAIL 613"; FAIL=1; }
          grep -q 'rmv2-62-final'  review-62.html  && echo "OK 62"  || { echo "FAIL 62";  FAIL=1; }
          grep -q 'rmv2-63-final'  review-63.html  && echo "OK 63"  || { echo "FAIL 63";  FAIL=1; }
          grep -q 'WHY ORGANISATIONS NEED DATA' review-612.html && echo "OK 612 header" || { echo "FAIL 612 header"; FAIL=1; }
          grep -q 'HOW DATA IS GENERATED'       review-613.html && echo "OK 613 header" || { echo "FAIL 613 header"; FAIL=1; }
          grep -q 'DATA FORMATS'                review-62.html  && echo "OK 62 header"  || { echo "FAIL 62 header";  FAIL=1; }
          grep -q 'DATA SYSTEMS'                review-63.html  && echo "OK 63 header"  || { echo "FAIL 63 header";  FAIL=1; }
          [ $FAIL -eq 0 ] || exit 1

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add review-612.html review-613.html review-62.html review-63.html
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "feat: Return Mission content - real MCQ questions for CA 6.1.2 6.1.3 6.2 6.3"
          git push origin main
