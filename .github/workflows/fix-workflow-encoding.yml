name: Fix Workflow Encoding Corruption

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to strip garbled Unicode from all workflow files'
        required: true

permissions:
  contents: write

jobs:
  fix-encoding:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync with latest remote main
        run: |
          git fetch origin main
          git merge origin/main --ff-only

      - name: Run encoding fix script
        run: |
          echo "" | base64 -d > /tmp/fix_encoding.py
          python3 /tmp/fix_encoding.py

      - name: Verify no garbled bytes remain
        run: |
          BAD=0
          for f in .github/workflows/*.yml; do
            NONASCII=$(python3 -c "t=open('$f',encoding='utf-8',errors='replace').read(); print(sum(1 for c in t if ord(c)>127 or ord(c)==65533))")
            if [ "$NONASCII" -eq 0 ]; then
              echo "CLEAN: $f"
            else
              echo "STILL HAS $NONASCII NON-ASCII CHARS: $f"
              BAD=1
            fi
          done
          if [ "$BAD" -eq 1 ]; then
            echo "ERROR: some files still have non-ASCII characters"
            exit 1
          fi
          echo "All workflow files verified clean"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/
          if git diff --cached --quiet; then
            echo "Nothing to commit - all files already clean"
            exit 0
          fi
          git diff --cached --stat
          git commit -m "fix: strip garbled Unicode from all workflow files

The ci upgrade batch commits corrupted Unicode chars in name: fields
and echo strings with invalid multi-byte sequences that GitHub YAML
parser rejects at L1. Strip all non-ASCII characters - all YAML
keywords and logic are ASCII-only so this is safe."
          git push origin main
