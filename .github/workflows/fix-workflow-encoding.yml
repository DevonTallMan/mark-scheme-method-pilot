name: Fix Workflow Encoding Corruption

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to strip garbled Unicode from workflow files'
        required: true

permissions:
  contents: write

jobs:
  fix-encoding:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Sync with latest remote main
        run: |
          git fetch origin main
          git merge origin/main --ff-only

      - name: Run encoding fix
        run: |
          python3 << 'PYEOF'
          import glob, re
          fixed = 0
          for path in glob.glob(".github/workflows/*.yml"):
              raw = open(path, "rb").read()
              text = raw.decode("utf-8", errors="replace").replace("\ufffd", "")
              lines = []
              for line in text.split("\n"):
                  if any(ord(c) > 127 for c in line):
                      line = "".join(c if ord(c) < 128 else "" for c in line)
                      line = re.sub(r"  +", " ", line).rstrip()
                  lines.append(line)
              result = "\n".join(lines)
              if result != text:
                  open(path, "w", encoding="utf-8").write(result)
                  print(f"FIXED: {path}")
                  fixed += 1
              else:
                  print(f"OK: {path}")
          print(f"Total fixed: {fixed}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/
          if git diff --cached --quiet; then
            echo "Nothing to commit - files already clean"
            exit 0
          fi
          git diff --cached --stat
          git commit -m "fix: strip garbled Unicode bytes from all workflow files"
          git push origin main
