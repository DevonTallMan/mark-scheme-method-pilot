name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Sync with latest remote main to prevent non-fast-forward push problems
      - name: Sync with latest remote main
        run: git pull origin main --ff-only

      # ---- 1: Set up Python 3.11 ------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # ---- 2: Install test dependencies -----------------------------
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---- 3: Unit & integration tests ------------------------------
      - name: Run pytest (unit + integration)
        run: |
          pytest tests/unit tests/integration \
            --cov=app --cov-report=xml \
            --alluredir=allure-results

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: coverage.xml

      # ---- 4: End-to-end UI tests (Playwright) ----------------------
      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Run e2e tests
        run: pytest tests/e2e --alluredir=allure-results

      # ---- 5: Performance tests (Locust) ----------------------------
      - name: Run Locust
        run: |
          locust -f tests/performance/locustfile.py \
            --headless -u 10 -r 2 --run-time 30s \
            --csv=locust_result

      - name: Attach performance report
        uses: actions/upload-artifact@v6
        with:
          name: performance-report
          path: locust_result_stats.csv

      # ---- 6: Security scan (OWASP ZAP) ----------------------------
      - name: Run ZAP scan
        run: python zap_scan.py

      - name: Attach ZAP report
        uses: actions/upload-artifact@v6
        with:
          name: zap-report
          path: zap_report.html

      # ---- 7: Generate and attach Allure report --------------------
      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -Ls \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Build Allure report
        run: allure generate allure-results -o allure-report --clean

      - name: Attach Allure artifact
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: allure-report

      # NOTE: The 'pages' deployment job has been removed.
      # The Allure report is available above as a downloadable artifact
      # on the Actions run page. Your live GitHub Pages site remains
      # untouched and served from your repo's main branch as normal.
