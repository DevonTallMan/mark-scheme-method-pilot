name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- 1: Set up Python 3.11 ------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ---- 2: Install test dependencies -----------------------------
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---- 3: Unit & integration tests ------------------------------
      - name: Run pytest (unit + integration)
        run: |
          pytest tests/unit tests/integration \
            --cov=app --cov-report=xml \
            --alluredir=allure-results

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

      # ---- 4: End-to-end UI tests (Playwright) ----------------------
      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Run e2e tests
        run: pytest tests/e2e --alluredir=allure-results

      # ---- 5: Performance tests (Locust) ----------------------------
      - name: Run Locust
        run: |
          locust -f tests/performance/locustfile.py \
            --headless -u 10 -r 2 --run-time 30s \
            --csv=locust_result

      - name: Attach performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: locust_result_stats.csv

      # ---- 6: Security scan (OWASP ZAP) ----------------------------
      - name: Run ZAP scan
        run: python zap_scan.py

      - name: Attach ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html

      # ---- 7: Generate Allure report --------------------------------
      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -Ls \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Build Allure report
        run: allure generate allure-results -o allure-report --clean

      - name: Attach Allure artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

  # ---- 8: Publish Allure to GitHub Pages (main only) ---------------
  pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
