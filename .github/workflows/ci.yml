name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Check key pages exist
        run: |
          MISSING=0
          for f in index.html hub.html topics.html dashboard.html teacher.html \
                   learn/index.html \
                   learn/6-1-1/index.html learn/6-1-2/index.html \
                   learn/6-1-3/index.html learn/6-2/index.html \
                   learn/6-3/index.html learn/6-4/index.html \
                   content-areas/classroom-611-v3.html \
                   review-611.html review-612.html review-613.html \
                   review-62.html review-63.html \
                   firebase-config.js; do
            [ -f "$f" ] && echo "OK: $f" || { echo "FAIL: missing $f"; MISSING=1; }
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Verify FT briefing openers — no THREAT ASSESSMENT
        run: |
          FAIL=0
          for f in learn/6-1-2/index.html learn/6-1-3/index.html \
                   learn/6-2/index.html learn/6-3/index.html learn/6-4/index.html; do
            grep -q "THREAT ASSESSMENT" "$f" \
              && { echo "FAIL: THREAT ASSESSMENT still present in $f"; FAIL=1; } \
              || echo "OK: $f"
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: Verify AXIOM-7 coaching register
        run: |
          FAIL=0
          for f in review-611.html review-612.html review-613.html review-62.html review-63.html; do
            grep -q "coaching a student" "$f" \
              && echo "OK: $f" \
              || { echo "FAIL: coaching prompt missing in $f"; FAIL=1; }
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: Verify AXIOM-7 parser tokens
        run: |
          FAIL=0
          for f in review-611.html review-612.html review-613.html review-62.html review-63.html; do
            grep -q "AWARDED:" "$f" && grep -q "MISSING:" "$f" && grep -q "NEI_SCORES:" "$f" \
              && echo "OK: $f" \
              || { echo "FAIL: parser tokens missing in $f"; FAIL=1; }
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: Verify content nav strip on all content path pages
        run: |
          FAIL=0
          for f in learn/6-1-1/index.html learn/6-1-2/index.html learn/6-1-3/index.html \
                   learn/6-2/index.html learn/6-3/index.html learn/6-4/index.html \
                   content-areas/classroom-611-v3.html \
                   content-areas/classroom-612.html content-areas/classroom-613.html \
                   content-areas/classroom-62.html content-areas/classroom-63.html \
                   content-areas/classroom-64.html; do
            grep -q "MSM-CONTENT-NAV" "$f" \
              && echo "OK: $f" \
              || { echo "FAIL: content nav strip missing in $f"; FAIL=1; }
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: Verify AXIOM-7 proxy — no direct Groq API calls
        run: |
          FAIL=0
          for f in review-611.html review-612.html review-613.html review-62.html review-63.html; do
            grep -qE "AXIOM7_PROXY_URL|workers\.dev" "$f" \
              && echo "OK proxy: $f" \
              || { echo "FAIL: proxy URL missing in $f"; FAIL=1; }
            grep -q "api\.groq\.com" "$f" \
              && { echo "FAIL: direct Groq API call found in $f"; FAIL=1; } || true
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: File size guardrails — flag HTML over 120KB
        run: |
          while IFS= read -r f; do
            size=$(wc -c < "$f")
            if [ "$size" -gt 122880 ]; then
              echo "WARN: $f is ${size} bytes — exceeds 120KB, review for bloat"
            fi
          done < <(find . -name "*.html" -not -path "./.git/*")
          echo "File size check complete"