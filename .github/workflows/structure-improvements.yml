name: Structure Improvements

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy'
        required: true

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Add contextual next-step links
        run: |
          echo "" | base64 -d > /tmp/s1.py
          python3 /tmp/s1.py

      - name: Hub cornerstone CTA and Return Mission panel
        run: |
          echo "" | base64 -d > /tmp/s2.py
          python3 /tmp/s2.py

      - name: Index click-depth shortcuts
        run: |
          echo "" | base64 -d > /tmp/s3.py
          python3 /tmp/s3.py

      - name: Verify
        run: |
          FAIL=0
          grep -q 'nextstep-ft-patched' learn/6-1-1/index.html && echo "OK ft nextstep" || { echo "FAIL ft nextstep"; FAIL=1; }
          grep -q 'nextstep-cl-patched' content-areas/classroom-611-v3.html && echo "OK cl nextstep" || { echo "FAIL cl nextstep"; FAIL=1; }
          grep -q 'cornerstone-patched' hub.html && echo "OK cornerstone" || { echo "FAIL cornerstone"; FAIL=1; }
          grep -q 'rm-panel-patched' hub.html && echo "OK rm panel" || { echo "FAIL rm panel"; FAIL=1; }
          grep -q 'depth-patched' index.html && echo "OK depth" || { echo "FAIL depth"; FAIL=1; }
          [ $FAIL -eq 0 ] || exit 1

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "feat: structure improvements - contextual links, cornerstone CTA, RM panel, click depth"
          git push origin main
