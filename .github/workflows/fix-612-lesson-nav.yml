name: Fix 6-1-2 Lesson — Add Navigation Buttons

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to apply the fix'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  fix-nav:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Verify target file exists
        run: |
          if [ ! -f "content-areas/6-1-2-why-organisations-need-data.html" ]; then
            echo "ERROR: content-areas/6-1-2-why-organisations-need-data.html not found. Aborting."
            exit 1
          fi
          echo "Target file found."

      - name: Check if buttons already exist
        id: check
        run: |
          if grep -q 'msm-lesson-nav' content-areas/6-1-2-why-organisations-need-data.html; then
            echo "already_done=true" >> $GITHUB_OUTPUT
            echo "Navigation buttons already present — skipping."
          else
            echo "already_done=false" >> $GITHUB_OUTPUT
            echo "No nav buttons found — will inject."
          fi

      - name: Inject navigation buttons before </body>
        if: steps.check.outputs.already_done == 'false'
        run: |
          python3 -c "
          with open('content-areas/6-1-2-why-organisations-need-data.html', 'r', encoding='utf-8') as f:
              content = f.read()

          nav_html = '''
          <div class=\"msm-lesson-nav\" style=\"
            display:flex;
            justify-content:center;
            gap:16px;
            padding:40px 20px;
            background:#0a0a0a;
            flex-wrap:wrap;
          \">
            <a href=\"../index.html\" style=\"
              display:inline-block;
              padding:14px 28px;
              background:transparent;
              border:2px solid #39ff14;
              color:#39ff14;
              font-family:monospace;
              font-size:14px;
              letter-spacing:0.1em;
              text-decoration:none;
              text-transform:uppercase;
              transition:all 0.2s;
            \" onmouseover=\"this.style.background=chr(39)+'#39ff14'+chr(39);this.style.color=chr(39)+'#000'+chr(39)\" onmouseout=\"this.style.background=chr(39)+'transparent'+chr(39);this.style.color=chr(39)+'#39ff14'+chr(39)\">
              \u2190 Back to Hub
            </a>
            <a href=\"../6-1-2/index.html\" style=\"
              display:inline-block;
              padding:14px 28px;
              background:#39ff14;
              border:2px solid #39ff14;
              color:#000;
              font-family:monospace;
              font-size:14px;
              letter-spacing:0.1em;
              text-decoration:none;
              text-transform:uppercase;
              font-weight:bold;
              transition:all 0.2s;
            \">
              Exam Practice \u2192
            </a>
          </div>
          '''

          # Use simple string replacement for hover — avoid shell escaping issues
          nav_html = nav_html.replace('chr(39)', chr(39))

          if '</body>' in content:
              content = content.replace('</body>', nav_html + '</body>')
          else:
              content = content + nav_html

          with open('content-areas/6-1-2-why-organisations-need-data.html', 'w', encoding='utf-8') as f:
              f.write(content)

          print('Navigation buttons injected successfully.')
          "

      - name: Commit and push
        if: steps.check.outputs.already_done == 'false'
        run: |
          git add content-areas/6-1-2-why-organisations-need-data.html
          git diff --cached --quiet && echo "Nothing to commit." || \
            git commit -m "fix: add navigation buttons to 6-1-2 lesson (back to hub + exam practice)"
          git push

      - name: Summary
        run: echo "Done — 6-1-2 lesson now has Back to Hub and Exam Practice navigation buttons."
