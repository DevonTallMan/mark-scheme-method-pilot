name: Contrast Fixes

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy'
        required: true

jobs:
  contrast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Apply contrast fixes
        run: |
          echo "" | base64 -d > /tmp/cf.py
          python3 /tmp/cf.py

      - name: Verify
        run: |
          FAIL=0
          grep -rl 'rgba(232,237,243,0.65)' . --include='*.html' --include='*.css' | grep -v .git | grep -q . && echo "OK colour updated" || { echo "FAIL colour not found"; FAIL=1; }
          [ $FAIL -eq 0 ] || exit 1

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "fix: a11y contrast - bump label alpha to 0.65, fix anchor colour"
          git push origin main
