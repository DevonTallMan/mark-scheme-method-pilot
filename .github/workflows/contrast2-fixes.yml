name: Contrast2 Fixes

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy'
        required: true

jobs:
  contrast2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Fix Teacher Access link colour and body background
        run: |
          echo "" | base64 -d > /tmp/c2.py
          python3 /tmp/c2.py

      - name: Verify
        run: |
          FAIL=0
          grep -q 'contrast2-patched' index.html && echo "OK index" || { echo "FAIL index"; FAIL=1; }
          grep -q 'color:#aaa' index.html && echo "OK teacher link colour" || { echo "FAIL teacher link colour"; FAIL=1; }
          grep -q 'background-color:#0a0a0f' index.html && echo "OK body background" || { echo "FAIL body background"; FAIL=1; }
          [ $FAIL -eq 0 ] || exit 1

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "fix: a11y contrast - teacher link #888->#aaa, explicit body background"
          git push origin main
