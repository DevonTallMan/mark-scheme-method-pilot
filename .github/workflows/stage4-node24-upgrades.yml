name: Stage 4 - Node 24 Action Upgrades

# Upgrades all four deprecated Node 20 GitHub Actions to their
# Node 24 releases across every workflow file in the repo,
# then removes the FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 flag.
#
# Confirmed Node 24 versions (verified against GitHub releases, March 2026):
#   actions/checkout        v4  ->  v5
#   actions/setup-python    v5  ->  v6
#   actions/upload-artifact v4  ->  v6
#   codecov/codecov-action  v4  ->  v5
#
# Also updates docs/ci.md Node upgrade plan status to Complete.
#
# Run: Actions > Stage 4 - Node 24 Action Upgrades > Run workflow > YES

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to upgrade all actions to Node 24'
        required: true
        default: ''

jobs:
  node24-upgrades:
    name: Upgrade actions and remove FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --ff-only

      - name: Show current action versions before upgrade
        run: |
          echo "=== Current action version pins in .github/workflows/ ==="
          grep -rh "uses:" .github/workflows/ | grep -v "^#" | sort | uniq | sed 's/^ */  /'

      - name: Patch all workflow files
        run: |
          echo "" | base64 -d > patch_node24.py
          python3 patch_node24.py

      - name: Verify upgrades and flag removal
        run: |
          echo "=== Action versions after upgrade ==="
          grep -rh "uses:" .github/workflows/ | grep -v "^#" | sort | uniq | sed 's/^ */  /'

          echo ""
          echo "=== Checking FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 is gone ==="
          if grep -rl "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24" .github/workflows/; then
            echo "WARNING: Flag still present in above file(s)"
          else
            echo "  CLEAN: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 fully removed"
          fi

          echo ""
          echo "=== Checking all four actions are at Node 24 versions ==="
          ISSUES=0
          for check in "actions/checkout@v5" "actions/setup-python@v6" "actions/upload-artifact@v6" "codecov/codecov-action@v5"; do
            if grep -rq "$check" .github/workflows/; then
              echo "  FOUND: $check"
            else
              echo "  NOT FOUND: $check (may not be used in this repo)"
            fi
          done

          # Check no old v4 pins remain for the upgraded actions
          for old in "actions/checkout@v4" "actions/setup-python@v5" "actions/upload-artifact@v4" "codecov/codecov-action@v4"; do
            if grep -rq "$old" .github/workflows/; then
              echo "  WARNING: Old pin still present: $old"
              ISSUES=1
            fi
          done
          if [ "$ISSUES" -eq 0 ]; then
            echo "  All old pins removed."
          fi

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — actions may already be at Node 24 versions."
          else
            git commit -m "Stage 4: upgrade all actions to Node 24 runtime

          Actions upgraded across all workflow files:
          - actions/checkout        v4 -> v5  (Node 24, runner >= 2.327.1)
          - actions/setup-python    v5 -> v6  (Node 24, runner >= 2.327.1)
          - actions/upload-artifact v4 -> v6  (Node 24, runner >= 2.327.1)
          - codecov/codecov-action  v4 -> v5  (latest, Node 24 compatible)

          Removed: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 env flag
          (was a temporary workaround — no longer needed)

          docs/ci.md: Node upgrade plan status updated to Complete

          Verified against official GitHub releases pages, March 2026."
            git push origin main
            echo "Pushed."
          fi
