name: Implement Sitemap Audit Fixes

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy'
        required: true

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Create Return Mission review pages (6.1.2 / 6.1.3 / 6.2 / 6.3)
        run: |
          echo "" | base64 -d > /tmp/create_review_pages.py
          python3 /tmp/create_review_pages.py

      - name: Patch hub.html — add static anchors for all Return Mission pages
        run: |
          echo "" | base64 -d > /tmp/patch_hub.py
          python3 /tmp/patch_hub.py

      - name: Patch index.html — add subtle teacher footer link
        run: |
          echo "" | base64 -d > /tmp/patch_index.py
          python3 /tmp/patch_index.py

      - name: Patch return-mission-scheduler.js — register new modules
        run: |
          echo "" | base64 -d > /tmp/patch_scheduler.py
          python3 /tmp/patch_scheduler.py

      - name: Generate sitemap.xml
        run: |
          echo "" | base64 -d > /tmp/gen_sitemap.py
          python3 /tmp/gen_sitemap.py

      - name: Verify all changes
        run: |
          FAIL=0
          for f in review-612.html review-613.html review-62.html review-63.html sitemap.xml; do
            if [ ! -f "$f" ]; then
              echo "FAIL — missing: $f"; FAIL=1
            else
              echo "OK — $f ($(wc -c < $f) bytes)"
            fi
          done
          grep -q 'Teacher Access' index.html && echo "OK — teacher link in index.html" || { echo "FAIL — teacher link missing from index.html"; FAIL=1; }
          grep -q 'review-612.html' hub.html     && echo "OK — static anchors in hub.html"          || { echo "FAIL — static anchors missing from hub.html"; FAIL=1; }
          grep -q '6-1-2' return-mission-scheduler.js && echo "OK — scheduler updated" || { echo "FAIL — scheduler not updated"; FAIL=1; }
          grep -q 'sitemap.xml' sitemap.xml && echo "OK — sitemap.xml valid" || { echo "FAIL — sitemap.xml empty"; FAIL=1; }
          [ $FAIL -eq 0 ] || exit 1

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add review-612.html review-613.html review-62.html review-63.html \
                  sitemap.xml hub.html index.html return-mission-scheduler.js
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "feat: sitemap audit — Return Mission x4, teacher link, static anchors, sitemap.xml"
          git push origin main
