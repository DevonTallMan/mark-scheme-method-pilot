name: Implement Sitemap Audit Fixes

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy'
        required: true

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Create Return Mission review pages
        run: |
          echo "" | base64 -d > /tmp/s1.py
          python3 /tmp/s1.py

      - name: Patch hub.html static anchors
        run: |
          echo "" | base64 -d > /tmp/s2.py
          python3 /tmp/s2.py

      - name: Patch index.html teacher link
        run: |
          echo "" | base64 -d > /tmp/s3.py
          python3 /tmp/s3.py

      - name: Patch return-mission-scheduler.js
        run: |
          echo "" | base64 -d > /tmp/s4.py
          python3 /tmp/s4.py

      - name: Generate sitemap.xml
        run: |
          echo "" | base64 -d > /tmp/s5.py
          python3 /tmp/s5.py

      - name: Verify all changes
        run: |
          FAIL=0
          for f in review-612.html review-613.html review-62.html review-63.html sitemap.xml; do
            [ -f "$f" ] && echo "OK $f ($(wc -c < $f) bytes)" || { echo "FAIL missing $f"; FAIL=1; }
          done
          grep -q 'Teacher Access' index.html && echo "OK teacher link" || { echo "FAIL teacher link"; FAIL=1; }
          grep -q 'review-612.html' hub.html && echo "OK static anchors" || { echo "FAIL static anchors"; FAIL=1; }
          grep -q '6-1-2' return-mission-scheduler.js && echo "OK scheduler" || { echo "FAIL scheduler"; FAIL=1; }
          grep -q 'urlset' sitemap.xml && echo "OK sitemap" || { echo "FAIL sitemap"; FAIL=1; }
          [ $FAIL -eq 0 ] || exit 1

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add review-612.html review-613.html review-62.html review-63.html sitemap.xml hub.html index.html return-mission-scheduler.js
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "feat: sitemap audit - Return Mission x4, teacher link, static anchors, sitemap.xml"
          git push origin main
