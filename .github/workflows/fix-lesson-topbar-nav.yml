name: Fix Lesson Pages Add Top Navigation Bar

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to apply the fix'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  fix-topbar:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Verify target files exist
        run: |
          for f in "content-areas/classroom-611-v3.html" "content-areas/6-1-2-why-organisations-need-data.html"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f not found. Aborting."
              exit 1
