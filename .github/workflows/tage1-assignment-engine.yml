      .ae-status-err { background: rgba(169,50,38,0.15); color: #e74c3c; border: 1px solid rgba(169,50,38,0.3); }
    </style>"""

          # ── Assignment Engine HTML block ───────────────────────────
          ASSIGNMENT_HTML = """
  <!-- ═══════════════════════════════════════════════════════════
       MSM ASSIGNMENT ENGINE  — injected by Stage 1 workflow
  ════════════════════════════════════════════════════════════ -->
  <section id="msm-assignment-engine">

    <!-- Create Assignment panel -->
    <div class="ae-panel">
      <div class="ae-panel-title">◈ Create Assignment</div>
