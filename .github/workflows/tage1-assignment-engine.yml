name: Stage 1 - Assignment Engine

# Builds the full Assignment Engine into teacher-dashboard.html
# and adds assignment awareness to dashboard.html (student side).
# Covers all 7 teacher-dashboard tasks plus student assignment awareness.
#
# Run manually: Actions > Stage 1 - Assignment Engine
#               > Run workflow > type YES > Run workflow

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to build the Assignment Engine'
        required: true
        default: ''

jobs:
  build-assignment-engine:
    name: Inject Assignment Engine into teacher and student dashboards
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --ff-only

      - name: Patch teacher-dashboard.html
        run: |
          echo "" | base64 -d > patch_teacher.py
          python3 patch_teacher.py

      - name: Patch dashboard.html - student assignment awareness
        run: |
          echo "" | base64 -d > patch_dashboard.py
          python3 patch_dashboard.py

      - name: Verify injection markers present
        run: |
          echo "=== Teacher dashboard markers ==="
          for marker in "msm-assignment-engine" "aeCreateAssignment" "aeDeleteAssignment" "ae-list"; do
            FILE=$(find . -name "teacher-dashboard.html" | head -1)
            if [ -n "$FILE" ] && grep -q "$marker" "$FILE"; then
              echo "  FOUND: $marker"
            else
              echo "  MISSING: $marker"
            fi
          done
          echo ""
          echo "=== Student dashboard markers ==="
          for marker in "msm-assignment-awareness" "ae-assigned-badge" "ae-student-panel"; do
            FILE=$(find . -name "dashboard.html" | head -1)
            if [ -n "$FILE" ] && grep -q "$marker" "$FILE"; then
              echo "  FOUND: $marker"
            else
              echo "  MISSING: $marker"
            fi
          done
          echo ""
          echo "=== ACTION REQUIRED after this workflow ==="
          echo "Replace all REPLACE_WITH_YOUR_* values in both patched files"
          echo "with your actual Firebase config from:"
          echo "Firebase console > Project settings > Your apps > SDK snippet"

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit - already patched."
          else
            git commit -m "Stage 1: Assignment Engine + student assignment awareness

          teacher-dashboard.html:
          - Firebase SDK (compat v9) injected
          - Create Assignment panel: title, module dropdown, due date, class code
          - Active Assignments list with real-time Firebase onValue listener
          - Per-assignment completion stats (X/Y complete, N in progress)
          - Delete Assignment action with cascade to student progress nodes

          dashboard.html:
          - Firebase SDK injected
          - Assigned Work panel on student dashboard
          - Progress pill per assignment (not started / in progress / complete)
          - ASSIGNED badge on matching topic cards
          - Auto-writes complete when module badge already earned in localStorage

          NOTE: Replace REPLACE_WITH_YOUR_* Firebase config placeholders in both files."
            git push origin main
            echo "Pushed successfully."
          fi
