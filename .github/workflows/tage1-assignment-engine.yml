name: Stage 1 — Assignment Engine

# ─────────────────────────────────────────────────────────────────
# Builds the full Assignment Engine into teacher-dashboard.html
# and adds assignment awareness to dashboard.html (student side).
#
# Covers all 7 teacher-dashboard tasks + student assignment awareness.
#
# Run manually: Actions → "Stage 1 — Assignment Engine"
#               → Run workflow → type YES → Run workflow
# ─────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to build the Assignment Engine'
        required: true
        default: ''

jobs:
  build-assignment-engine:
    name: Inject Assignment Engine into teacher and student dashboards
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Sync with remote main (mandatory pattern) ───────────────
      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --ff-only

      # ── 3. Patch teacher-dashboard.html ───────────────────────────
      - name: Patch teacher-dashboard.html — inject Assignment Engine
        run: |
          python3 - <<'PYEOF'
          import os, re

          TARGET = "teacher-dashboard.html"

          if not os.path.exists(TARGET):
              # Try to find it
              import glob
              found = glob.glob("**/teacher-dashboard.html", recursive=True)
              if found:
                  TARGET = found[0]
              else:
                  print(f"ERROR: teacher-dashboard.html not found in repo.")
                  exit(1)

          print(f"Patching: {TARGET}")

          with open(TARGET, "r", encoding="utf-8") as f:
              html = f.read()

          if "msm-assignment-engine" in html:
              print("SKIP: Assignment Engine already present.")
              exit(0)

          # ── Firebase SDK scripts to inject before </head> ──────────
          FIREBASE_SCRIPTS = """
    <!-- Firebase SDK (compat) — Assignment Engine -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>"""

          # ── Assignment Engine CSS to inject before </head> ─────────
          ASSIGNMENT_CSS = """
    <style id="msm-assignment-engine-css">
      /* ── Assignment Engine ── */
      #msm-assignment-engine {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
