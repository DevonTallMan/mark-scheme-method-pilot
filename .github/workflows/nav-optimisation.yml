name: Nav Optimisation

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy'
        required: true

jobs:
  nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Standardise global nav - hub, topics, dashboard
        run: |
          echo "" | base64 -d > /tmp/nav1.py
          python3 /tmp/nav1.py

      - name: Add breadcrumbs to leaf pages
        run: |
          echo "" | base64 -d > /tmp/nav2.py
          python3 /tmp/nav2.py

      - name: Fix broken classroom exam link
        run: |
          echo "" | base64 -d > /tmp/nav3.py
          python3 /tmp/nav3.py

      - name: Verify
        run: |
          FAIL=0
          grep -q 'nav-optimised' hub.html      && echo "OK hub nav"      || { echo "FAIL hub nav";      FAIL=1; }
          grep -q 'nav-optimised' topics.html   && echo "OK topics nav"   || { echo "FAIL topics nav";   FAIL=1; }
          grep -q 'nav-optimised' dashboard.html && echo "OK dash nav"    || { echo "FAIL dash nav";     FAIL=1; }
          grep -q 'msm-breadcrumb' learn/6-1-1/index.html && echo "OK ft 611 breadcrumb" || { echo "FAIL ft 611 breadcrumb"; FAIL=1; }
          grep -q 'msm-breadcrumb' review-611.html && echo "OK rm 611 breadcrumb" || { echo "FAIL rm 611 breadcrumb"; FAIL=1; }
          grep -q 'mark-scheme-method-pilot' content-areas/classroom-611-v3.html && echo "OK broken link fixed" || { echo "FAIL broken link"; FAIL=1; }
          [ $FAIL -eq 0 ] || exit 1

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "feat: nav optimisation - 3-item global nav, breadcrumbs, broken link fix"
          git push origin main
