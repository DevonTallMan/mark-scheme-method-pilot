name: Homepage — Master Your T Levels section

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy'
        required: true
        default: 'NO'

jobs:
  inject-section:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Create feature branch
        run: |
          git checkout -b homepage-master-t-levels || git checkout homepage-master-t-levels

      - name: Decode and run patch script
        run: |
          python3 -c "
          import base64
          data = ''
          with open('patch_master_section.py', 'wb') as f:
              f.write(base64.b64decode(data))
          "
          python3 patch_master_section.py

      - name: Verify injection
        run: |
          if grep -q "MASTER_T_LEVELS_SECTION" index.html; then
            echo "VERIFY PASS: Master Your T Levels section found in index.html"
          else
            echo "VERIFY FAIL: Section marker not present after patch"
            exit 1
          fi
          if grep -q "msm-benefit-grid" index.html; then
            echo "VERIFY PASS: Benefit grid CSS found"
          else
            echo "VERIFY FAIL: CSS missing"
            exit 1
          fi

      - name: Commit and push feature branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: add Master Your T Levels section to homepage

          - Injected benefit grid (Identify / Address / Track) before PROBLEM section
          - Reuses existing .section, .s-eyebrow, .s-title, .btn-primary CSS classes
          - Only new CSS: .msm-benefit-* classes (prefixed, no collision risk)
          - CTAs: Start Your First Module to topics.html, How It Works anchor
          - Idempotent: skips if MASTER_T_LEVELS_SECTION marker already present
          - Anchor: <!-- PROBLEM --> comment in index.html"
          git push origin homepage-master-t-levels
