name: Fix 6-1-2 Module 6.3 Link

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to apply the fix'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  fix-link:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Verify target file exists
        run: |
          if [ ! -f "6-1-2/index.html" ]; then
            echo "ERROR: 6-1-2/index.html not found. Aborting."
            exit 1
          fi
