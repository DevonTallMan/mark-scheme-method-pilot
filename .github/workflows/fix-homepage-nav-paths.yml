name: Fix Homepage Nav Paths

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to run'
        required: true

permissions:
  contents: write

jobs:
  fix-nav-paths:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'YES' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main && git merge origin/main --ff-only

      - name: Diagnose and fix nav paths in index.html
        run: |
          python3 << 'PYEOF'
          import re

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # Show all href and src values for diagnosis
          all_links = re.findall(r'(?:href|src)=["\']([^"\']+)["\']', content)
          print("=== ALL LINKS FOUND IN index.html ===")
          for link in all_links:
              print(f"  {link}")

          # Fix 1: root-relative paths missing the subpath
          # e.g. href="/topics.html" â href="/mark-scheme-method-pilot/topics.html"
          fixed = re.sub(
              r'(href|src)="(/(?!mark-scheme-method-pilot)(?!#)(?!\w+://)([^"]+))"',
              r'\1="/mark-scheme-method-pilot/\3"',
              content
          )

          # Fix 2: absolute URLs missing the subpath
          # e.g. https://devontallman.github.io/topics.html
          fixed = re.sub(
              r'https://devontallman\.github\.io/(?!mark-scheme-method-pilot)(?![\s"\'])',
              'https://devontallman.github.io/mark-scheme-method-pilot/',
              fixed
          )

          if fixed != content:
              print("\n=== CHANGES MADE ===")
              orig_links = re.findall(r'(?:href|src)=["\']([^"\']+)["\']', content)
              new_links = re.findall(r'(?:href|src)=["\']([^"\']+)["\']', fixed)
              for o, n in zip(orig_links, new_links):
                  if o != n:
                      print(f"  {o}  â  {n}")
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(fixed)
              print("\nindex.html updated.")
          else:
              print("\nNo changes needed â paths already correct.")
          PYEOF

      - name: Commit and push
        run: |
          git add index.html
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "Fix: correct root-relative nav paths in index.html for GitHub Pages subpath"
          git push origin main
