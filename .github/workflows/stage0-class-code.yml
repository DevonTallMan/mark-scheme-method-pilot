name: Stage 0 Class Code Parameterisation

#
# Replaces every hardcoded '5MFH4P' class code in client-side JS
# with a dynamic CLASS_CODE constant read from the ?class= URL
# parameter, falling back to '5MFH4P' so Dave's class keeps working.
#
# Run manually from: Actions tab "Stage 0 Class Code
# Parameterisation" Run workflow type YES Run workflow
#

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to run the class code parameterisation'
        required: true
        default: ''

jobs:
  parameterise:
    name: Inject CLASS_CODE constant and replace hardcoded references
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

 # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

