name: Restructure Move Extras to /content-areas/

# When this runs:
# Trigger manually from the GitHub website.
# Go to: Actions tab > "Restructure" > Run workflow > Run workflow (green button)
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm you want to run the restructure'
        required: true
        default: ''

jobs:
  restructure:
    name: Move extras files and update all links
    runs-on: ubuntu-latest

    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create /content-areas/ folder and move extras files
        run: |
          mkdir -p content-areas

          if [ -f "6-1-1/classroom-611-v3.html" ]; then
            git mv "6-1-1/classroom-611-v3.html" "content-areas/classroom-611-v3.html"
