name: Restructure â Move Extras to /content-areas/

# When this runs:
# Trigger manually from the GitHub website.
# Go to: Actions tab > "Restructure" > Run workflow > Run workflow (green button)
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm you want to run the restructure'
        required: true
        default: ''

jobs:
  restructure:
    name: Move extras files and update all links
    runs-on: ubuntu-latest

    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create /content-areas/ folder and move extras files
        run: |
          mkdir -p content-areas

          if [ -f "6-1-1/classroom-611-v3.html" ]; then
            git mv "6-1-1/classroom-611-v3.html" "content-areas/classroom-611-v3.html"
            echo "Moved: 6-1-1/classroom-611-v3.html to content-areas/"
          else
            echo "Not found (skipping): 6-1-1/classroom-611-v3.html"
          fi

          if [ -f "6-1-2/6-1-2-why-organisations-need-data.html" ]; then
            git mv "6-1-2/6-1-2-why-organisations-need-data.html" "content-areas/6-1-2-why-organisations-need-data.html"
            echo "Moved: 6-1-2/6-1-2-why-organisations-need-data.html to content-areas/"
          else
            echo "Not found (skipping): 6-1-2/6-1-2-why-organisations-need-data.html"
          fi

          if [ -f "6-1-3/6-1-3-how-data-is-generated.html" ]; then
            git mv "6-1-3/6-1-3-how-data-is-generated.html" "content-areas/6-1-3-how-data-is-generated.html"
            echo "Moved: 6-1-3/6-1-3-how-data-is-generated.html to content-areas/"
          else
            echo "Not found (skipping): 6-1-3/6-1-3-how-data-is-generated.html"
          fi

      - name: Fix asset paths in moved files
        run: |
          for f in content-areas/*.html; do
            [ -f "$f" ] || continue
            sed -i 's|href="../|href="../../|g' "$f"
            sed -i 's|src="../|src="../../|g' "$f"
            echo "Patched paths in: $f"
          done

      - name: Update links in root index files
        run: |
          for idx in index.html 6-1-1/index.html 6-1-2/index.html 6-1-3/index.html; do
            [ -f "$idx" ] || continue
            sed -i 's|classroom-611-v3\.html|../content-areas/classroom-611-v3.html|g' "$idx"
            sed -i 's|6-1-2-why-organisations-need-data\.html|../content-areas/6-1-2-why-organisations-need-data.html|g' "$idx"
            sed -i 's|6-1-3-how-data-is-generated\.html|../content-areas/6-1-3-how-data-is-generated.html|g' "$idx"
            echo "Updated links in: $idx"
          done

      - name: Create redirect stubs at old subdirectory paths
        run: |
          python3 -c '
          import os
          nl = chr(10)
          q = chr(34)
          stubs = [
              ("6-1-1/classroom-611-v3.html", "../content-areas/classroom-611-v3.html"),
              ("6-1-2/6-1-2-why-organisations-need-data.html", "../content-areas/6-1-2-why-organisations-need-data.html"),
          ]
          for src, dest in stubs:
              if not os.path.exists(src) and os.path.exists("content-areas/" + os.path.basename(src)):
                  html = (
                      "<!DOCTYPE html>" + nl +
                      "<html lang=" + q + "en" + q + ">" + nl +
                      "<head>" + nl +
                      "  <meta charset=" + q + "UTF-8" + q + ">" + nl +
                      "  <meta http-equiv=" + q + "refresh" + q + " content=" + q + "0; url=" + dest + q + ">" + nl +
                      "  <title>Redirecting...</title>" + nl +
                      "</head>" + nl +
                      "<body>" + nl +
                      "  <p>This page has moved. <a href=" + q + dest + q + ">Click here</a> if not redirected.</p>" + nl +
                      "</body>" + nl +
                      "</html>" + nl
                  )
                  open(src, "w").write(html)
                  print("Created redirect stub: " + src)
          '

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "restructure: move extras HTML to /content-areas/ and add redirect stubs"
            git push
            echo "Done - changes pushed to main."
          fi
