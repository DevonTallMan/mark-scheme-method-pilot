name: Wire 6.1 Study Guide into Navigation

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to patch topics.html and learn/index.html'
        required: true

permissions:
  contents: write

jobs:
  wire-nav:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync with latest remote main
        run: |
          git fetch origin main
          git merge origin/main --ff-only

      - name: Verify content page exists
        run: |
          FILE="content-areas/6-1-data-fundamentals.html"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE not found"
            echo "Run the add-61-content.yml workflow first, then re-run this one"
            exit 1
          fi
          echo "OK: content page confirmed"

      - name: Run nav patch script
        run: |
          echo "" | base64 -d > /tmp/patch_nav.py
          python3 /tmp/patch_nav.py

      - name: Verify patch
        run: |
          if ! grep -q '6-1-data-fundamentals' topics.html 2>/dev/null; then
            echo 'ERROR: link not found in topics.html after patch'
            grep -n '6-1' topics.html | head -20 || echo 'No matches'
            exit 1
          fi
          COUNT=$(grep -c '6-1-data-fundamentals' topics.html)
          echo "VERIFIED: $COUNT link(s) injected into topics.html"
          grep -n '6-1-data-fundamentals' topics.html | head -10

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topics.html
          git add learn/index.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo 'Nothing to commit - links already present'
            exit 0
          fi
          git diff --cached --stat
          git commit -m 'feat: wire 6.1 study guide into topic card navigation'
          git push origin main
