name: Stage 1 - Assignment Engine

# Builds the Firestore-backed Assignment Engine into teacher.html
# and adds assignment awareness to dashboard.html.
#
# Fixes applied vs previous attempts:
#   - Correct filename: teacher.html (not teacher-dashboard.html)
#   - Removes dead compat SDK script tags from teacher.html
#   - Injects firebase-config.js module tag into dashboard.html
#     (which previously had no Firebase references at all)
#   - All Firebase calls use window.MSM_DB (Firestore v10 modular)
#
# Firestore schema:
#   classes/{classCode}/assignments/{assignmentId}
#   classes/{classCode}/students/{uid}  (assignmentProgress map)
#
# Run: Actions > Stage 1 - Assignment Engine > Run workflow > YES

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to build the Assignment Engine'
        required: true
        default: ''

jobs:
  build-assignment-engine:
    name: Inject Firestore Assignment Engine
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --ff-only

      - name: Confirm teacher.html and firebase-config.js are present
        run: |
          if [ ! -f "teacher.html" ]; then
            echo "ERROR: teacher.html not found in repo root."
            find . -name "teacher*.html" | grep -v ".git"
            exit 1
          fi
          echo "OK: teacher.html found"
          if [ ! -f "firebase-config.js" ]; then
            echo "ERROR: firebase-config.js not found in repo root."
            exit 1
          fi
          echo "OK: firebase-config.js found"

      - name: Patch teacher.html - Assignment Engine
        run: |
          echo "" | base64 -d > patch_teacher_fs.py
          python3 patch_teacher_fs.py

      - name: Patch dashboard.html - student assignment awareness
        run: |
          echo "" | base64 -d > patch_dashboard_fs.py
          python3 patch_dashboard_fs.py

      - name: Verify
        run: |
          echo "=== teacher.html ==="
          for marker in "msm-ae-firestore" "aeCreateAssignment" "writeBatch" "firebase-app-compat"; do
            if grep -q "$marker" teacher.html; then
              [ "$marker" = "firebase-app-compat" ]                 && echo "  WARNING: compat tag still present: $marker"                 || echo "  FOUND: $marker"
            else
              [ "$marker" = "firebase-app-compat" ]                 && echo "  CLEAN: compat tag removed"                 || echo "  MISSING: $marker"
            fi
          done
          echo ""
          echo "=== dashboard.html ==="
          for marker in "msm-awareness-firestore" "firebase-config.js" "ae-student-panel"; do
            grep -q "$marker" dashboard.html               && echo "  FOUND: $marker"               || echo "  MISSING: $marker"
          done

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Stage 1: Firestore Assignment Engine + student assignment awareness

          teacher.html:
          - Removed dead compat SDK script tags (firebase-app-compat, firebase-firestore-compat)
          - Assignment Engine CSS + HTML panel injected
          - Create Assignment: title, module dropdown, due date, class code (pre-filled)
          - Active Assignments with real-time onSnapshot listener
          - Per-assignment completion stats via getDocs on students collection
          - Delete with writeBatch cascading to student assignmentProgress maps
          - All Firebase calls via window.MSM_DB (Firestore v10 modular)

          dashboard.html:
          - firebase-config.js module script tag injected (was missing entirely)
          - Assigned Work panel with progress pill per assignment
          - ASSIGNED badge on matching topic cards
          - Auto-writes complete when module badge already earned in localStorage

          Firestore schema: classes/{classCode}/assignments + classes/{classCode}/students"
            git push origin main
            echo "Pushed."
          fi
