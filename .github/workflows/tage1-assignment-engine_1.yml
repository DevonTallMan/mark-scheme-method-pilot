name: Stage 1 - Assignment Engine

# Builds the full Firestore-backed Assignment Engine into
# teacher-dashboard.html and adds assignment awareness to dashboard.html.
#
# Uses Firestore (Firebase v10 modular SDK) via window.MSM_DB
# exposed by firebase-config.js — no compat SDK required.
#
# Firestore schema written by this workflow:
#   classes/{classCode}/assignments/{assignmentId}
#   classes/{classCode}/students/{uid}  (assignmentProgress map field)
#
# Run: Actions > Stage 1 - Assignment Engine > Run workflow > YES

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to build the Assignment Engine'
        required: true
        default: ''

jobs:
  build-assignment-engine:
    name: Inject Firestore Assignment Engine
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --ff-only

      - name: Check firebase-config.js is present and has databaseURL removed
        run: |
          if [ ! -f "firebase-config.js" ]; then
            echo "ERROR: firebase-config.js not found in repo root."
            exit 1
          fi
          echo "OK: firebase-config.js found."
          echo "Contents preview:"
          head -30 firebase-config.js

      - name: Patch teacher-dashboard.html
        run: |
          echo "" | base64 -d > patch_teacher_fs.py
          python3 patch_teacher_fs.py

      - name: Patch dashboard.html - student assignment awareness
        run: |
          echo "" | base64 -d > patch_dashboard_fs.py
          python3 patch_dashboard_fs.py

      - name: Verify injection markers
        run: |
          echo "=== Teacher dashboard ==="
          FILE=$(find . -name "teacher-dashboard.html" | grep -v ".git" | head -1)
          for marker in "msm-ae-firestore" "aeCreateAssignment" "aeDeleteAssignment" "writeBatch"; do
            grep -q "$marker" "$FILE" && echo "  FOUND: $marker" || echo "  MISSING: $marker"
          done
          echo ""
          echo "=== Student dashboard ==="
          FILE=$(find . -name "dashboard.html" | grep -v ".git" | head -1)
          for marker in "msm-awareness-firestore" "ae-assigned-badge" "ae-student-panel"; do
            grep -q "$marker" "$FILE" && echo "  FOUND: $marker" || echo "  MISSING: $marker"
          done
          echo ""
          echo "=== No compat SDK remnants ==="
          grep -rl "firebase-app-compat" --include="*.html" . | grep -v ".git"             && echo "WARNING: compat SDK references still present"             || echo "  CLEAN: no compat SDK references"

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Stage 1: Firestore Assignment Engine + student assignment awareness

          teacher-dashboard.html:
          - Assignment Engine panel injected (Create + Active Assignments)
          - Uses Firestore v10 modular SDK via window.MSM_DB (firebase-config.js)
          - addDoc to classes/{classCode}/assignments on form submit
          - onSnapshot real-time listener on assignments collection
          - Per-assignment completion stats via getDocs on students collection
          - Delete with writeBatch to cascade removal from student progress maps

          dashboard.html:
          - Assigned Work panel with progress pill per assignment
          - ASSIGNED badge on matching topic cards
          - Auto-writes complete to assignmentProgress map when badge already earned
          - Uses Firestore getDoc / updateDoc / setDoc with merge

          Firestore schema: classes/{classCode}/assignments + classes/{classCode}/students"
            git push origin main
            echo "Pushed."
          fi
