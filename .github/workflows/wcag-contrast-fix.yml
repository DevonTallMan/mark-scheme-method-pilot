name: WCAG Contrast Fix -- raise --text-ghost and --muted

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to apply WCAG contrast fixes'
        required: true

jobs:
  fix-contrast:
    if: github.event.inputs.confirm == 'YES'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync with latest remote main
        run: git fetch origin main && git merge origin/main --ff-only

      - name: Apply contrast patches
        env:
          SCRIPT_B64: ""
        run: python3 -c "import base64,os; exec(base64.b64decode(os.environ['SCRIPT_B64']).decode())"

      - name: Verify -- teacher.html ghost raised
        run: |
          if grep -q 'text-ghost: rgba(232,237,243,0.50)' teacher.html; then
            echo "PASS: --text-ghost now 0.50 in teacher.html"
          else
            echo "FAIL: --text-ghost not updated in teacher.html"
            exit 1
          fi
          if grep -q 'text-ghost: rgba(232,237,243,0.15)' teacher.html; then
            echo "FAIL: old 0.15 value still present in teacher.html"
            exit 1
          fi

      - name: Verify -- no remaining muted text uses
        run: |
          HITS=$(grep -rl 'color:.*var(--muted)' --include='*.html' . 2>/dev/null | wc -l)
          if [ "$HITS" -gt 0 ]; then
            echo "FAIL: color:var(--muted) still present in $HITS file(s):"
            grep -rl 'color:.*var(--muted)' --include='*.html' .
            exit 1
          else
            echo "PASS: no color:var(--muted) text uses remaining"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "fix: WCAG AA contrast - raise --text-ghost 0.15->0.50, --muted->--dim"
          git push origin main
