name: Stage 2 - Live Student Dashboard

# Patches dashboard.html with 10 tasks:
#   1  XP total and rank label from localStorage
#   2  NEI Proficiency Map per-module N/E/I scores
#   3  Badge progression panel (earned vs locked)
#   4  CA6 Coverage bar (animated)
#   5  Module completion rings (stroke-dashoffset)
#   6  Exam countdown to 11 May 2026
#   7  Firestore student snapshot write on load
#   8  Firebase anonymous auth on first visit (generates msm_uid)
#   9  AXIOM-7 Groq fetch error handling (try/catch + user message)
#  10  NEI Checker fetch error handling (try/catch + user message)
#
# localStorage keys used: msm_xp, msm_badges, msm_ft_{moduleId},
#   msm_nei_{moduleId}, msm_uid, msm_callsign
#
# Run: Actions > Stage 2 - Live Student Dashboard > Run workflow > YES

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to patch the live student dashboard'
        required: true
        default: ''

jobs:
  live-dashboard:
    name: Patch dashboard.html with live data reads
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --ff-only

      - name: Confirm dashboard.html and firebase-config.js present
        run: |
          [ -f "dashboard.html" ] && echo "OK: dashboard.html" || { echo "ERROR: dashboard.html not found"; exit 1; }
          [ -f "firebase-config.js" ] && echo "OK: firebase-config.js" || { echo "ERROR: firebase-config.js not found"; exit 1; }

      - name: Patch dashboard.html - tasks 1-8
        run: |
          echo "" | base64 -d > patch_dashboard_stage2.py
          python3 patch_dashboard_stage2.py

      - name: Patch AXIOM-7 and NEI Checker error handling - tasks 9-10
        run: |
          echo "" | base64 -d > patch_error_handling.py
          python3 patch_error_handling.py

      - name: Verify
        run: |
          echo "=== dashboard.html Stage 2 markers ==="
          for marker in "msm-stage2-dashboard" "renderXP" "renderNEIMap" "renderBadges" "renderCA6Bar" "renderCompletionRings" "renderExamCountdown" "signInAnonymously" "setDoc"; do
            grep -q "$marker" dashboard.html               && echo "  FOUND: $marker"               || echo "  MISSING: $marker"
          done
          echo ""
          echo "=== Error handling: Groq + NEI Checker ==="
          if grep -rl "msmGroqFetch" --include="*.html" --include="*.js" . | grep -v ".git" | grep -v "patch_" > /dev/null 2>&1; then
            echo "  FOUND: msmGroqFetch wrapper injected"
            grep -rl "msmGroqFetch" --include="*.html" --include="*.js" . | grep -v ".git" | grep -v "patch_"
          else
            echo "  INFO: No Groq fetch calls found in codebase (may use variable URL or module import)"
          fi
          if grep -rl "msmNEIFetch" --include="*.html" --include="*.js" . | grep -v ".git" | grep -v "patch_" > /dev/null 2>&1; then
            echo "  FOUND: msmNEIFetch wrapper injected"
            grep -rl "msmNEIFetch" --include="*.html" --include="*.js" . | grep -v ".git" | grep -v "patch_"
          else
            echo "  INFO: No NEI Checker fetch calls found at toolsforteaching.co.uk"
          fi

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Stage 2: Live student dashboard data + error handling

          dashboard.html:
          - XP total and rank label read from msm_xp (localStorage)
          - NEI Proficiency Map reads msm_nei_{moduleId} per module
          - Badge panel reads msm_badges: earned shown active, remainder locked
          - CA6 Coverage bar counts badges against CA6_BADGE_IDS, animates on load
          - Module completion rings read msm_ft_{moduleId} station data
          - Exam countdown calculated to 11 May 2026 (urgent styling under 14 days)
          - Firebase anonymous auth on first visit, uid stored as msm_uid
          - Student snapshot written to classes/{classCode}/students/{uid} on load
            fields: xp, badges, completedModules, lastSeen, classCode, callsign

          Error handling (Tasks 9 + 10):
          - msmGroqFetch wrapper: try/catch around all Groq API calls
            On failure: user sees AXIOM-7 offline message, error logged to console
          - msmNEIFetch wrapper: try/catch around all NEI Checker calls
            On failure: user sees marking unavailable message, no silent failures"
            git push origin main
            echo "Pushed."
          fi
