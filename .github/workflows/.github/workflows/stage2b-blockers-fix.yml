name: Stage 2b - Fix Blockers

# Addresses the four Stage 2 sign-off blockers:
#
#  1. firebase-config.js — exposes window.MSM_APP (needed for getAuth)
#  2. dashboard.html    — anonymous auth fixed to use window.MSM_APP
#                         full student snapshot write (xp, badges,
#                         completedModules, ca6Count, neiProfile, lastSeen)
#  3. dashboard.html    — NEI Proficiency Map: robust injector that
#                         creates its own container if none matches,
#                         so bars are never hardcoded
#  4. firestore.rules   — written to repo root, ready for deployment
#
# NOTE on Firestore rules deployment:
# This workflow writes firestore.rules to the repo.
# To deploy them you need one of:
#   a) Firebase Hosting with firestore.rules in firebase.json (auto-deploys)
#   b) Run: firebase deploy --only firestore:rules  (requires Firebase CLI)
#   c) Paste the rules manually in Firebase console > Firestore > Rules
# Option (c) is browser-only and takes 2 minutes.
#
# Run: Actions > Stage 2b - Fix Blockers > Run workflow > YES

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to apply Stage 2 blocker fixes'
        required: true
        default: ''

jobs:
  fix-stage2-blockers:
    name: Fix auth, snapshot, NEI map, and Firestore rules
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --ff-only

      - name: Fix 1 - Expose window.MSM_APP in firebase-config.js
        run: |
          echo "" | base64 -d > patch_firebase_config.py
          python3 patch_firebase_config.py

      - name: Fix 2 and 3 - Auth, snapshot write, and NEI map injector
        run: |
          echo "" | base64 -d > patch_auth_and_snapshot.py
          python3 patch_auth_and_snapshot.py

      - name: Fix 4 - Write firestore.rules to repo root
        run: |
          echo "" | base64 -d > firestore.rules
          echo "firestore.rules written:"
          cat firestore.rules

      - name: Verify
        run: |
          echo "=== firebase-config.js ==="
          grep -q "MSM_APP" firebase-config.js             && echo "  FOUND: window.MSM_APP exposed"             || echo "  MISSING: window.MSM_APP"

          echo ""
          echo "=== dashboard.html ==="
          for marker in "msm-stage2b-auth" "msm-stage2b-nei" "signInAnonymously" "neiProfile" "ca6Count" "writeStudentSnapshot"; do
            grep -q "$marker" dashboard.html               && echo "  FOUND: $marker"               || echo "  MISSING: $marker"
          done

          echo ""
          echo "=== firestore.rules ==="
          [ -f "firestore.rules" ]             && echo "  PRESENT: firestore.rules ( lines)"             || echo "  MISSING: firestore.rules"

          echo ""
          echo "=== ACTION REQUIRED: deploy Firestore rules ==="
          echo "  Quickest option (browser-only, 2 minutes):"
          echo "  Firebase console > Firestore Database > Rules tab"
          echo "  Paste the contents of firestore.rules > Publish"

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Stage 2b: fix auth, snapshot write, NEI map, add Firestore rules

          firebase-config.js:
          - Exposes window.MSM_APP alongside window.MSM_DB
            so getAuth(window.MSM_APP) works from any module script

          dashboard.html:
          - msm-stage2b-auth: anonymous auth using getAuth(window.MSM_APP)
            Handles both new and returning sessions via onAuthStateChanged
            Writes msm_uid to localStorage for leaderboard + assignment awareness
          - Full student snapshot: uid, xp, badges, completedModules,
            ca6Count, neiProfile (per-module NEI scores), lastSeen, callsign
          - msm-stage2b-nei: robust NEI Proficiency Map injector
            Finds existing container via common selectors OR creates
            its own panel if nothing matches — bars never hardcoded

          firestore.rules:
          - Student docs: auth.uid == uid (own doc read/write only)
          - Assignments: authenticated read, teacher/classCode write
          - Leaderboard: authenticated read across class students
          - Default deny everything else
          NOTE: rules must be deployed via Firebase console or CLI"
            git push origin main
            echo "Pushed."
          fi
