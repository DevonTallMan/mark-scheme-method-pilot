name: Stage 3 - Dynamic Leaderboard

# Replaces the static placeholder leaderboard in hub.html with a
# live Firestore-backed leaderboard.
#
# Data source: classes/{classCode}/students/{uid}
# Written by Stage 2 dashboard on every student visit.
# No additional Firebase writes needed.
#
# Tasks covered:
#   1  Real-time onSnapshot listener on students collection
#   2  Sort by XP descending, cap at top 10
#   3  Render rows: rank (medal emoji top 3), display name, XP, badge count
#      Current student row highlighted — shows (you) indicator
#   4  Callsign input: saves to localStorage + Firestore student doc
#      Displayed on leaderboard instead of truncated UID
#   5  Rank delta: up/down arrows vs last session (stored on page unload)
#   6  Error state: Firestore rule failure surfaces as visible message
#
# Run: Actions > Stage 3 - Dynamic Leaderboard > Run workflow > YES

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to inject the live leaderboard'
        required: true
        default: ''

jobs:
  dynamic-leaderboard:
    name: Replace static leaderboard with Firestore live version
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --ff-only

      - name: Confirm hub.html present
        run: |
          [ -f "hub.html" ] && echo "OK: hub.html" || { echo "ERROR: hub.html not found"; find . -name "hub*.html" | grep -v ".git"; exit 1; }
          [ -f "firebase-config.js" ] && echo "OK: firebase-config.js" || echo "WARNING: firebase-config.js not found — will be injected"

      - name: Patch hub.html - live leaderboard
        run: |
          echo "" | base64 -d > patch_leaderboard.py
          python3 patch_leaderboard.py

      - name: Verify
        run: |
          echo "=== hub.html leaderboard markers ==="
          for marker in "msm-leaderboard-live" "onSnapshot" "renderLeaderboard" "lbSaveCallsign" "lb-delta" "lb-row-current" "firebase-config.js"; do
            grep -q "$marker" hub.html               && echo "  FOUND: $marker"               || echo "  MISSING: $marker"
          done
          echo ""
          echo "=== Confirm static placeholder removed ==="
          for placeholder in "Placeholder" "placeholder" "Coming Soon" "COMING SOON"; do
            if grep -q "$placeholder" hub.html; then
              echo "  CHECK: '$placeholder' still present — verify it is not inside the old leaderboard"
            fi
          done

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Stage 3: Dynamic live leaderboard in hub.html

          hub.html:
          - firebase-config.js module script tag injected (if not present)
          - Static placeholder leaderboard replaced with live Firestore version
          - Real-time onSnapshot listener on classes/{classCode}/students
          - Sorted by XP descending, top 10 displayed
          - Medal emoji for top 3 ranks (gold/silver/bronze)
          - Current student row highlighted with (you) indicator
          - Callsign input: opt-in display name saved to localStorage + Firestore
          - Rank delta arrows (up/down/same) vs rank stored from last session
          - Rank map saved to localStorage on page unload for next session delta
          - Error state surfaces Firestore permission failures as visible message
          - Live indicator dot with pulse animation

          Data source: classes/{classCode}/students/{uid}
          Populated by Stage 2 student snapshot write on dashboard load.
          No additional Firebase writes required."
            git push origin main
            echo "Pushed."
          fi
