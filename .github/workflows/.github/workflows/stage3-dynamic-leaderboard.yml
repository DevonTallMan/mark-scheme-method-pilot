name: Stage 3 - Dynamic Leaderboard

# Direct injection of the Firestore live leaderboard into hub.html.
# This version replaces the previous workflow which failed to write
# the actual HTML/JS changes to hub.html.
#
# Verbose patch output confirms every step so you can see exactly
# where the injection landed in the Actions log.
#
# Run: Actions > Stage 3 - Dynamic Leaderboard > Run workflow > YES

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to inject the live leaderboard into hub.html'
        required: true
        default: ''

jobs:
  dynamic-leaderboard:
    name: Inject live leaderboard into hub.html
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest remote main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --ff-only

      - name: List HTML files in root (diagnostic)
        run: |
          echo "=== HTML files in repo root ==="
          ls -la *.html 2>/dev/null || echo "(none in root)"
          echo ""
          echo "=== All hub*.html in repo ==="
          find . -name "hub*.html" | grep -v ".git" || echo "(none found)"

      - name: Patch hub.html
        run: |
          echo "" | base64 -d > patch_leaderboard_direct.py
          python3 patch_leaderboard_direct.py

      - name: Verify all markers present in hub.html
        run: |
          HUB=$(find . -name "hub.html" | grep -v ".git" | head -1)
          if [ -z "$HUB" ]; then
            echo "ERROR: hub.html not found after patch"
            exit 1
          fi
          echo "=== Checking $HUB ==="
          ALL_GOOD=true
          for marker in "msm-leaderboard-live" "onSnapshot" "lbSaveCallsign" "lb-delta" "lb-row-current" "firebase-config.js"; do
            if grep -q "$marker" "$HUB"; then
              echo "  FOUND: $marker"
            else
              echo "  MISSING: $marker"
              ALL_GOOD=false
            fi
          done
          if [ "$ALL_GOOD" = "false" ]; then
            echo ""
            echo "ERROR: One or more markers missing. Check patch output above."
            exit 1
          fi
          echo ""
          echo "All markers present. Leaderboard injection confirmed."

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — hub.html may already be fully patched."
          else
            git commit -m "Stage 3: inject live Firestore leaderboard into hub.html

          hub.html changes:
          - firebase-config.js module tag added (if missing)
          - Static placeholder leaderboard replaced with live version
          - onSnapshot listener on classes/{classCode}/students
          - Sorted by XP descending, top 10 displayed
          - Medal emoji for ranks 1-3, number for 4-10
          - Current student highlighted with gold tint and (you) label
          - lbSaveCallsign: writes callsign to localStorage + Firestore
          - lb-delta rank arrows (up/down/same) vs previous session
          - Rank map saved to localStorage on page unload
          - Error state visible if Firestore rules block the read"
            git push origin main
            echo "Pushed."
          fi
