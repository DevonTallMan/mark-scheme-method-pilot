# MSM AXIOM-7 Cloudflare Worker — Stage 5
# Deploy with: wrangler deploy
# Set API key with: wrangler secret put GROQ_API_KEY

name = "msm-axiom-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding    = "MSM_RATE_KV"
id         = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"
